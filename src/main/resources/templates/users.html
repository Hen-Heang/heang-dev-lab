<!DOCTYPE html>
<!--
  users.html — Thymeleaf version (converted from users.jsp)
  This page is mostly jQuery AJAX — server only renders the HTML shell.

  Key changes:
  - ${pageContext.request.contextPath}/css/... → th:href="@{/css/...}"
  - ${pageContext.request.contextPath}/js/... → th:src="@{/js/...}"
  - All jQuery/AJAX code stays exactly the same
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>User Management - Store Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>🏪 Store Admin</h1>
        <nav class="nav">
            <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
            <a th:href="@{/store/category}" class="nav-link">Category</a>
            <a th:href="@{/store/product}" class="nav-link">Product</a>
            <a th:href="@{/}" class="nav-link active">Users</a>
            <a th:href="@{/auth/logout}"
               style="padding:8px 16px;background:#e74c3c;color:#fff;border:none;border-radius:4px;text-decoration:none;">
                Logout (로그아웃)
            </a>
        </nav>
    </header>

    <main class="main">
        <div class="page-header">
            <h2>User Management (사용자 관리)</h2>
            <a th:href="@{/user-list}" class="btn btn-primary">View All Users</a>
        </div>

        <div id="message" class="message"></div>

        <div class="form-section">
            <h2>New User Information (새 사용자 정보)</h2>
            <form id="createUserForm">
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" name="username" required maxlength="100"
                           placeholder="Enter username"/>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required maxlength="150"
                           placeholder="Enter email"/>
                </div>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" maxlength="100"
                           placeholder="Enter full name"/>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" maxlength="20"
                           placeholder="Enter phone number"/>
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required minlength="8"
                           maxlength="255" placeholder="Enter password"/>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="">-- Select Status --</option>
                        <option value="ACTIVE">Active</option>
                        <option value="INACTIVE">Inactive</option>
                        <option value="PENDING">Pending</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success">Create User</button>
            </form>
        </div>

        <h2>Recent Users (최근 사용자)</h2>
        <div id="usersTableContainer">
            <div class="loading">Loading users...</div>
        </div>

        <div id="successModal" class="modal-overlay">
            <div class="modal">
                <h2>User Created Successfully! (사용자 생성 완료!)</h2>
                <div class="modal-body">
                    <div class="user-detail">
                        <div class="user-detail-row">
                            <span class="user-detail-label">Username:</span>
                            <span class="user-detail-value" id="modalUsername"></span>
                        </div>
                        <div class="user-detail-row">
                            <span class="user-detail-label">Email:</span>
                            <span class="user-detail-value" id="modalEmail"></span>
                        </div>
                        <div class="user-detail-row">
                            <span class="user-detail-label">Status:</span>
                            <span class="user-detail-value" id="modalStatus"></span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeSuccessModal()">Close</button>
                    <button class="btn btn-success" onclick="createAnother()">Create Another</button>
                </div>
            </div>
        </div>

        <!-- th:src generates context-path-aware URL for external JS -->
        <script th:src="@{/js/user-api.js}"></script>

        <!-- jQuery code stays exactly the same as the JSP version -->
        <script>
            $(document).ready(function () {
                loadUsers();
                setupModalCloseOnOutsideClick('successModal');
                $('#createUserForm').on('submit', function (e) {
                    e.preventDefault();
                    createUser();
                });
            });

            function createUser() {
                const userData = {
                    username: $('#username').val(),
                    email: $('#email').val(),
                    name: $('#name').val() || null,
                    phone: $('#phone').val() || null,
                    password: $('#password').val(),
                    status: $('#status').val() || null
                };
                UserAPI.create(userData,
                    function (result) {
                        showSuccessModal(userData);
                        $('#createUserForm')[0].reset();
                        loadUsers();
                    },
                    function (xhr, status, error) {
                        let errorMsg = 'Failed to create user';
                        if (xhr.responseJSON && xhr.responseJSON.resultMsg) {
                            errorMsg = xhr.responseJSON.resultMsg;
                        }
                        UIHelper.showMessage('message', errorMsg, false);
                    }
                );
            }

            function showSuccessModal(userData) {
                $('#modalUsername').text(userData.username);
                $('#modalEmail').text(userData.email);
                $('#modalStatus').text(userData.status || 'Not specified');
                UIHelper.showModal('successModal');
            }

            function closeSuccessModal() { UIHelper.closeModal('successModal'); }
            function createAnother() { closeSuccessModal(); $('#username').focus(); }

            function loadUsers() {
                UserAPI.getAll(
                    function (result) {
                        renderUsersTable(result.data && result.data.length > 0 ? result.data : []);
                    },
                    function (xhr, status, error) {
                        $('#usersTableContainer').html('<p class="muted">Error loading users.</p>');
                    }
                );
            }

            function renderUsersTable(users) {
                const $container = $('#usersTableContainer');
                let html = '<table>';
                html += '<thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Status</th></tr></thead><tbody>';
                if (!users || users.length === 0) {
                    html += '<tr><td colspan="4" class="no-data">No Data (데이터가 없습니다)</td></tr>';
                } else {
                    $.each(users, function (index, user) {
                        html += '<tr>';
                        html += '<td>' + user.id + '</td>';
                        html += '<td>' + UIHelper.escapeHtml(user.username) + '</td>';
                        html += '<td>' + UIHelper.escapeHtml(user.email) + '</td>';
                        html += '<td>' + UIHelper.getStatusBadge(user.status) + '</td>';
                        html += '</tr>';
                    });
                }
                html += '</tbody></table>';
                $container.html(html);
            }
        </script>
    </main>
</div>
</body>
</html>
