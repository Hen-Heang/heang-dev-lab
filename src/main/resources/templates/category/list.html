<!DOCTYPE html>
<!--
  category/list.html — Thymeleaf version (converted from category/list.jsp)
  Data is fully loaded via jQuery AJAX — no server-side loops needed here.
  Main changes: th:href/@{} for links, th:src for scripts, remove JSP taglibs.
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- th:text="${pageTitle}" sets the <title> content from Model -->
    <title th:text="${pageTitle} + ' - Store Admin'">Category Management - Store Admin</title>
    <!-- th:href="@{/css/admin.css}" generates the correct context-path-aware URL -->
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="container">
    <header class="header">
        <h1>🏪 Store Admin</h1>
        <nav class="nav">
            <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
            <a th:href="@{/store/category}" class="nav-link active">Category</a>
            <a th:href="@{/store/product}" class="nav-link">Product</a>
            <a th:href="@{/}" class="nav-link">Users</a>
        </nav>
    </header>

    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <!-- th:text renders the pageTitle from the controller Model -->
                <h2 th:text="${pageTitle}">Category Management</h2>
                <p class="page-hint">Create and organize categories for your catalog.</p>
            </div>
            <button type="button" id="btnAdd" class="btn btn-primary">+ Add Category</button>
        </div>

        <!-- Category List Table — tbody is populated via AJAX (category.js) -->
        <div class="table-container">
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Category Name</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="categoryTableBody">
                <tr>
                    <td colspan="4" class="text-center">Loading data...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Category Create/Edit Modal -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add Category</h3>
            <button type="button" class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <form id="categoryForm">
            <input type="hidden" id="categoryId">
            <div class="form-group">
                <label for="categoryName">Category Name <span class="required">*</span></label>
                <input type="text" id="categoryName" name="name" class="form-control"
                       placeholder="Enter category name" required>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- th:src generates the correct URL for the JS file -->
<script th:src="@{/js/category.js}"></script>
</body>
</html>
