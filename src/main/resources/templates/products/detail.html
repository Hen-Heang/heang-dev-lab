<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <title>Product Detail</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .field {
            margin: 16px 0;
        }

        label {
            font-weight: bold;
            display: block;
            color: #555;
            margin-bottom: 4px;
        }

        .value {
            font-size: 1.1rem;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 18px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: #4A90D9;
            color: white;
        }

        .btn-warning {
            background: #f0ad4e;
            color: white;
        }

        .btn-danger {
            background: #d9534f;
            color: white;
        }

        .btn-secondary {
            background: #eee;
            color: #333;
        }

    </style>
</head>

<body>
<h1>Product Detail</h1>

<div>
    <label>ID</label>
    <span class="value" th:text="${product.id}"></span>
</div>

<div>
    <label>Name</label>
    <span class="value" th:text="${product.name}"></span>
</div>
<div>
    <label>Category</label>
    <span class="value" th:text="${product.categoryName}"></span>
</div>

<div>
    <label>Price</label>
    <span class="value"
          th:text="${#numbers.formatInteger(product.price, 0,
  'COMMA')} + ' ₩'"></span>

</div>

<div>
    <label>Stock</label>
    <span class="value" th:text="${product.stock}"></span>
</div>

<!--Delete user form Post because HTML Links only do get-->

<div class="actions">
    <a th:href="@{/products/list}" class="btn
  btn-secondary">← Back to List</a>
    <a
            th:href="@{/products/{id}/edit(id=${product.id})}"
            class="btn btn-warning">Edit</a>

    <!-- Delete: uses a form POST because HTML links
only do GET -->
    <form
            th:action="@{/products/{id}/delete(id=${product.id})}"
            method="post" style="display:inline;">
        <button type="submit" class="btn btn-danger"
                onclick="return confirm('Delete this product?')">Delete</button>
    </form>
</div>


</body>
</html>
