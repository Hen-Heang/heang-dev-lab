<!DOCTYPE html>
<!--
  login.html — Spring Security login page (로그인 페이지)

  How Spring Security uses this form:
    action="/login"   → POST /login is handled by Spring Security (no controller needed)
    name="username"   → matches .usernameParameter("username") in SecurityConfig
    name="password"   → matches .passwordParameter("password") in SecurityConfig

  On success → redirect to /dashboard
  On failure → redirect back to /login?error  (errorMsg shown)
  On logout  → redirect to /login?logout      (logoutMsg shown)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Store Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1d2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background pattern (배경 패턴) */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(59,91,219,.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(112,72,232,.12) 0%, transparent 60%);
            pointer-events: none;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Logo (로고) */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #3b5bdb, #7048e8);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .logo-text {
            font-size: 20px; font-weight: 700;
            color: #fff; letter-spacing: -0.3px;
        }
        .logo-text span {
            display: block;
            font-size: 12px; font-weight: 400;
            color: #7b8fb5; letter-spacing: 0;
        }

        /* Card (카드) */
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 24px 64px rgba(0,0,0,.4);
        }

        .card-title {
            font-size: 22px; font-weight: 700;
            color: #1e2a3a;
            margin-bottom: 4px;
        }
        .card-sub {
            font-size: 14px; color: #7b8fb5;
            margin-bottom: 28px;
        }

        /* Alert messages (알림 메시지) */
        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex; align-items: flex-start; gap: 8px;
        }
        .alert-error  { background: #fff0f0; color: #c92a2a; border: 1px solid #ffc9c9; }
        .alert-success { background: #e6f9f0; color: #087f5b; border: 1px solid #8ce99a; }

        /* Form fields */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px; font-weight: 600;
            color: #444; margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e0e4ef;
            border-radius: 10px;
            font-size: 14px; font-family: inherit;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
            color: #1e2a3a;
        }
        .form-group input:focus {
            border-color: #3b5bdb;
            box-shadow: 0 0 0 3px rgba(59,91,219,.12);
        }

        /* Login button */
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3b5bdb, #7048e8);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px; font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity .15s, transform .15s;
        }
        .btn-login:hover { opacity: .9; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }

        /* Hint (힌트) */
        .hint {
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid #f0f2f7;
            font-size: 12px; color: #aaa;
            text-align: center;
            line-height: 1.6;
        }
        .hint strong { color: #3b5bdb; }
    </style>
</head>
<body>
<div class="login-wrap">

    <!-- Logo -->
    <div class="logo">
        <div class="logo-icon">🏪</div>
        <div class="logo-text">
            Store Admin
            <span>Management Panel</span>
        </div>
    </div>

    <div class="card">
        <h1 class="card-title">Sign In</h1>
        <p class="card-sub">로그인하여 관리 패널에 접근하세요</p>

        <!-- Error message (로그인 실패 메시지) -->
        <!-- th:if="${errorMsg}" → only shown when ?error param is in URL -->
        <div th:if="${errorMsg}" class="alert alert-error">
            ⚠ <span th:text="${errorMsg}"></span>
        </div>

        <!-- Logout success message (로그아웃 메시지) -->
        <div th:if="${logoutMsg}" class="alert alert-success">
            ✓ <span th:text="${logoutMsg}"></span>
        </div>

        <!--
            th:action="@{/login}" → Thymeleaf automatically adds the CSRF hidden field
            Spring Security intercepts POST /login — no controller method needed
        -->
        <form th:action="@{/login}" method="post">

            <div class="form-group">
                <label for="username">Username (아이디)</label>
                <input type="text"
                       id="username"
                       name="username"
                       placeholder="Enter username"
                       autocomplete="username"
                       autofocus />
            </div>

            <div class="form-group">
                <label for="password">Password (비밀번호)</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Enter password"
                       autocomplete="current-password" />
            </div>

            <button type="submit" class="btn-login">Login (로그인)</button>
        </form>

        <!-- Test account hint (테스트 계정 안내) -->
        <div class="hint">
            Test accounts (테스트 계정) — password: <strong>password123</strong><br>
            admin · john_doe · jane_doe
        </div>
    </div>

</div>
</body>
</html>
