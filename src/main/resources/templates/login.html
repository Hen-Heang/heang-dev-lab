<!DOCTYPE html>
<!--
  login.html — Spring Security login page (로그인 페이지)

  How Spring Security uses this form:
    action="/login" → POST /login is handled by Spring Security (no controller needed)
    name="username" → matches .usernameParameter("username") in SecurityConfig
    name="password" → matches .passwordParameter("password") in SecurityConfig

  On success → redirect to /dashboard
  On failure → redirect back to /login?error (errorMsg shown)
  On logout → redirect to /login?logout (logoutMsg shown)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Store Admin</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-wrap">

    <div class="logo">
        <div class="logo-icon">🏪</div>
        <div class="logo-text">
            Store Admin
            <span>Management Panel</span>
        </div>
    </div>

    <div class="card">
        <h1 class="card-title">Sign In</h1>
        <p class="card-sub">로그인하여 관리 패널에 접근하세요</p>

        <div th:if="${errorMsg}" class="alert alert-error">
            ⚠ <span th:text="${errorMsg}"></span>
        </div>

        <div th:if="${logoutMsg}" class="alert alert-success">
            ✓ <span th:text="${logoutMsg}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username (아이디)</label>
                <input type="text" id="username" name="username"
                       placeholder="Enter username" autocomplete="username" autofocus />
            </div>
            <div class="form-group">
                <label for="password">Password (비밀번호)</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter password" autocomplete="current-password" />
            </div>
            <button type="submit" class="btn-login">Login (로그인)</button>
        </form>

        <div class="hint">
            Test accounts (테스트 계정) — password: <strong>password</strong><br>
            admin · john_doe · jane_doe
        </div>
    </div>

</div>
</body>
</html>
