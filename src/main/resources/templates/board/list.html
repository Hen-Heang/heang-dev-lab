<!DOCTYPE html>
<!--
  board/list.html
  Board list with search + pagination (검색 + 페이지네이션)
  Backend is ready: BoardSearchV0 → DAO → XML → Controller passes totalPages, search, boards
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Board List (게시판 목록)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f7; color: #1e2a3a; }

        .page-wrap { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        /* ── Top bar ── */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .top-bar h2 { font-size: 20px; font-weight: 700; }
        .top-bar .back-btn {
            text-decoration: none; color: #555; font-size: 14px;
            padding: 7px 14px; border: 2px solid #d0d5e0;
            border-radius: 8px; transition: background .15s;
        }
        .top-bar .back-btn:hover { background: #e8ecf4; }

        /* ── Search form ── */
        .search-card {
            background: #fff; border-radius: 12px;
            padding: 18px 20px; margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        .search-card select, .search-card input[type=text] {
            border: 1.5px solid #d0d5e0; border-radius: 8px;
            padding: 8px 12px; font-size: 14px; outline: none;
            transition: border-color .15s;
        }
        .search-card select { width: 130px; }
        .search-card input[type=text] { flex: 1; min-width: 200px; }
        .search-card select:focus,
        .search-card input[type=text]:focus { border-color: #3b5bdb; }

        .btn {
            padding: 8px 18px; border-radius: 8px; border: none;
            font-size: 14px; font-weight: 500; cursor: pointer;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            transition: opacity .15s, background .15s;
        }
        .btn:hover { opacity: .85; }
        .btn-primary { background: #3b5bdb; color: #fff; }
        .btn-secondary { background: #e8ecf4; color: #444; }
        .btn-danger   { background: #e03131; color: #fff; }
        .btn-success  { background: #2f9e44; color: #fff; }
        .btn-sm { padding: 5px 12px; font-size: 13px; }

        /* ── Action bar ── */
        .action-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .total-count { font-size: 14px; color: #555; }
        .total-count strong { color: #3b5bdb; }

        /* ── Table ── */
        .table-card {
            background: #fff; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: #f7f8fc; padding: 12px 16px;
            font-size: 12px; font-weight: 600; color: #7b8fb5;
            text-transform: uppercase; letter-spacing: .5px;
            border-bottom: 1.5px solid #e8ecf4;
            text-align: left;
        }
        tbody td {
            padding: 13px 16px; font-size: 14px;
            border-bottom: 1px solid #f0f2f7;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #f7f8fc; }

        .no-col   { width: 60px;  color: #aaa; text-align: center; }
        .title-col a {
            color: #1e2a3a; text-decoration: none; font-weight: 500;
        }
        .title-col a:hover { color: #3b5bdb; text-decoration: underline; }
        .status-badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }
        .badge-active   { background: #e6f9f0; color: #0ca678; }
        .badge-inactive { background: #fff0f0; color: #e03131; }
        .date-col { color: #7b8fb5; font-size: 13px; white-space: nowrap; }
        .action-col { white-space: nowrap; }

        .empty-row td {
            text-align: center; padding: 40px;
            color: #aaa; font-size: 14px;
        }

        /* ── Pagination ── */
        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 6px; margin-top: 24px; flex-wrap: wrap;
        }
        .page-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 8px;
            text-decoration: none; font-size: 14px; font-weight: 500;
            color: #555; background: #fff;
            border: 1.5px solid #e0e4ef;
            transition: background .15s, color .15s, border-color .15s;
        }
        .page-btn:hover { background: #e8ecf4; border-color: #c5cce8; }
        .page-btn.active {
            background: #3b5bdb; color: #fff;
            border-color: #3b5bdb; pointer-events: none;
        }
        .page-btn.disabled {
            color: #ccc; pointer-events: none; border-color: #eee;
        }
    </style>
</head>
<body>
<div class="page-wrap">

    <!-- Top bar -->
    <div class="top-bar">
        <h2>Board List (게시판 목록)</h2>
        <a th:href="@{/dashboard}" class="back-btn">← Dashboard</a>
    </div>

    <!-- Search form (검색 폼) -->
    <!--
        th:action="@{/board/list.do}" — Thymeleaf URL builder
        GET method → search params appear in URL: ?searchType=title&keyword=hello
        This lets users copy/share search result URLs (bookmarkable)
    -->
    <form id="searchForm" method="get" th:action="@{/board/list.do}" class="search-card">
        <!--
            searchType dropdown — matches BoardSearchV0.searchType field
            th:value / th:selected compares current value to keep selection after submit
        -->
        <select name="searchType">
            <option value="title"
                    th:selected="${search.searchType == 'title'}">Title (제목)</option>
            <option value="content"
                    th:selected="${search.searchType == 'content'}">Content (내용)</option>
        </select>

        <!--
            th:value="${search.keyword}" — keeps the keyword in the box after search
            Without this the input would be blank after submitting
        -->
        <input type="text"
               name="keyword"
               th:value="${search.keyword}"
               placeholder="Search... (검색어 입력)" />

        <button type="submit" class="btn btn-primary">Search</button>

        <!--
            Clear: just go to /board/list.do with no params → default empty search
        -->
        <a th:href="@{/board/list.do}" class="btn btn-secondary">Clear</a>
    </form>

    <!-- Action bar -->
    <div class="action-bar">
        <p class="total-count">
            Total <strong th:text="${totalCount}">0</strong> posts
        </p>
        <div style="display:flex; gap:8px;">
            <!-- Excel download button (엑셀 다운로드) — Korean enterprise standard -->
            <a th:href="@{/excel/board}" class="btn btn-secondary">📥 Excel</a>
            <a th:href="@{/board/insertForm.do}" class="btn btn-success">+ Write (등록)</a>
        </div>
    </div>

    <!-- Board table -->
    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th class="no-col">No</th>
                    <th>Title (제목)</th>
                    <th>Status</th>
                    <th>Date (날짜)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!--
                    th:each="board, stat : ${boards}"
                    stat.index = 0-based index on THIS page
                    Real No = totalCount - offset - stat.index
                    offset = (currentPage - 1) * pageSize
                    This gives descending number across all pages (Korean standard)
                -->
                <tr th:each="board, stat : ${boards}">
                    <td class="no-col"
                        th:text="${totalCount - search.offset - stat.index}">1</td>

                    <td class="title-col">
                        <a th:href="@{/board/detail.do(boardSn=${board.boardSn})}"
                           th:text="${board.boardTitle}">Title</a>
                    </td>

                    <td>
                        <span th:if="${board.useYn == 'Y'}"
                              class="status-badge badge-active">Active</span>
                        <span th:unless="${board.useYn == 'Y'}"
                              class="status-badge badge-inactive">Inactive</span>
                    </td>

                    <td class="date-col"
                        th:text="${#temporals.format(board.dataRegDt, 'yyyy-MM-dd HH:mm')}">
                        2026-01-01 00:00
                    </td>

                    <td class="action-col">
                        <button class="btn btn-secondary btn-sm"
                                th:onclick="|location.href='@{/board/detail.do(boardSn=${board.boardSn})}'|">
                            View
                        </button>
                        <button class="btn btn-danger btn-sm"
                                th:onclick="'deleteBoard(' + ${board.boardSn} + ')'">
                            Delete
                        </button>
                    </td>
                </tr>

                <!-- Empty state (게시글 없음) -->
                <tr th:if="${#lists.isEmpty(boards)}" class="empty-row">
                    <td colspan="5">No posts found (게시글이 없습니다)</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ============================================================
         Pagination (페이지네이션)

         th:if="${totalPages > 0}" — don't render if no data
         #numbers.sequence(1, totalPages) — generates [1, 2, 3 ... N]

         Each page link carries keyword + searchType so search is not lost
         when you click page 2, 3, etc.

         th:class append — adds 'active' class to current page button
         ============================================================ -->
    <div class="pagination" th:if="${totalPages > 0}">

        <!-- Previous button (이전) -->
        <a th:href="@{/board/list.do(currentPage=${search.currentPage - 1},
                       keyword=${search.keyword},
                       searchType=${search.searchType})}"
           class="page-btn"
           th:classappend="${search.currentPage <= 1} ? ' disabled'"
        >&#8592;</a>

        <!-- Page number buttons -->
        <a th:each="i : ${#numbers.sequence(1, totalPages)}"
           th:href="@{/board/list.do(currentPage=${i},
                       keyword=${search.keyword},
                       searchType=${search.searchType})}"
           th:text="${i}"
           class="page-btn"
           th:classappend="${i == search.currentPage} ? ' active'">
        </a>

        <!-- Next button (다음) -->
        <a th:href="@{/board/list.do(currentPage=${search.currentPage + 1},
                       keyword=${search.keyword},
                       searchType=${search.searchType})}"
           class="page-btn"
           th:classappend="${search.currentPage >= totalPages} ? ' disabled'"
        >&#8594;</a>

    </div>

</div><!-- /page-wrap -->

<!-- Hidden form for soft-delete POST (HTML forms only support GET/POST) -->
<form id="deleteForm" method="post" th:action="@{/board/delete.do}">
    <input type="hidden" id="deleteBoardSn" name="boardSn" value="" />
</form>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    function deleteBoard(boardSn) {
        if (!confirm('Delete this post? (삭제하시겠습니까?)')) return;
        $('#deleteBoardSn').val(boardSn);
        $('#deleteForm').submit();
    }
</script>

</body>
</html>
