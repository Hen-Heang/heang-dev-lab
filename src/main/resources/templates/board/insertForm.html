<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Write Board - Store Admin</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <style>
        .file-label {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px;
            border: 2px dashed var(--line); border-radius: 8px;
            cursor: pointer; transition: border-color .15s, background .15s;
        }
        .file-label:hover { border-color: var(--primary); background: #f0f4ff; }
        .file-label input[type=file] { display: none; }
        .file-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
        .file-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
        .file-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 7px 12px; background: var(--bg);
            border-radius: 6px; font-size: 13px;
        }
    </style>
</head>
<body class="sidebar-layout">

<!-- ── Sidebar ── -->
<aside th:replace="~{fragments/sidebar :: sidebar('board')}"></aside>

<!-- ── Main Content ── -->
<div class="main-content">
    <header class="topbar">
        <div class="topbar-left">
            <div class="topbar-breadcrumb">
                Home <span>›</span>
                <a th:href="@{/board/list.do}" style="color:var(--muted);text-decoration:none;">게시판 (Board)</a>
                <span>›</span> <strong>등록 (Write Post)</strong>
            </div>
        </div>
        <div class="topbar-right">
            <a th:href="@{/swagger-ui.html}" class="topbar-btn" title="API Docs">🔌</a>
            <div class="avatar">A</div>
        </div>
    </header>

    <div class="page-content">

        <div class="page-header">
            <div class="page-title">
                <h1>Write Post <span style="font-size:14px;color:var(--muted);font-weight:400;">(게시글 등록)</span></h1>
            </div>
            <a th:href="@{/board/list.do}" class="btn btn-secondary">← Back to List</a>
        </div>

        <div class="card" style="max-width:720px;">
            <div style="padding:22px;">
                <form id="insertForm" method="post"
                      th:action="@{/board/insert.do}"
                      enctype="multipart/form-data">

                    <div class="form-group">
                        <label for="boardTitle">Title (제목) *</label>
                        <input type="text" id="boardTitle" name="boardTitle" class="form-control"
                               placeholder="Enter title (제목 입력)"/>
                        <p id="titleError" style="color:var(--danger);font-size:12px;margin-top:4px;display:none;">
                            Title is required (제목을 입력하세요)
                        </p>
                    </div>

                    <div class="form-group">
                        <label for="boardCn">Content (내용)</label>
                        <textarea id="boardCn" name="boardCn" rows="7" class="form-control"
                                  placeholder="Enter content (내용 입력)"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Attachments (첨부파일)</label>
                        <label class="file-label">
                            <input type="file" id="fileInput" name="files" multiple/>
                            <span style="font-size:20px;">📎</span>
                            <span style="font-size:14px;color:var(--muted);">Click to attach files (파일 선택)</span>
                        </label>
                        <p class="file-hint">Max 5MB per file. Multiple files allowed.</p>
                        <div class="file-list" id="fileList"></div>
                    </div>

                    <input type="hidden" name="useYn" value="Y"/>

                    <div style="display:flex;gap:10px;margin-top:8px;">
                        <button type="button" class="btn btn-primary" onclick="submitInsert()">Save (저장)</button>
                        <button type="button" class="btn btn-secondary"
                                th:onclick="|location.href='@{/board/list.do}'|">Cancel (취소)</button>
                    </div>
                </form>
            </div>
        </div>

    </div><!-- /page-content -->
</div><!-- /main-content -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    $('#fileInput').on('change', function () {
        const $list = $('#fileList').empty();
        const files = this.files;
        for (let i = 0; i < files.length; i++) {
            const sizeKb = (files[i].size / 1024).toFixed(1);
            $list.append(
                `<div class="file-item">
                    <span>📄 ${files[i].name} <span style="color:var(--muted)">(${sizeKb} KB)</span></span>
                </div>`
            );
        }
    });

    function submitInsert() {
        const title = $('#boardTitle').val().trim();
        if (title === '') {
            $('#titleError').show();
            $('#boardTitle').focus();
            return;
        }
        $('#titleError').hide();
        $('#insertForm').submit();
    }

    $('#boardTitle').on('input', function () {
        if ($(this).val().trim() !== '') $('#titleError').hide();
    });
</script>
</body>
</html>
