<!DOCTYPE html>
<!--
  board/detail.html — Thymeleaf version (converted from board/detail.jsp)
  JSP 변환:
    value="<c:out value='${board.boardTitle}'/>" → th:value="${board.boardTitle}"
    <textarea><c:out value="${board.boardCn}"/></textarea> → <textarea th:text="${board.boardCn}">
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Board Detail (게시글 상세)</title>
    <style>
        body  { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        th    { background: #f4f4f4; width: 150px; }
        .btn  { padding: 6px 12px; cursor: pointer; margin-right: 5px; }
        .btn-primary { background: #007bff; color: white; border: none; }
        .btn-success { background: #28a745; color: white; border: none; }
        .btn-danger  { background: #dc3545; color: white; border: none; }
        .error-msg   { color: red; font-size: 12px; display: none; }
    </style>
</head>
<body>

<h2>Board Detail (게시글 상세)</h2>

<!-- ================================================================
     Detail View (상세 보기)
     th:text auto-escapes — safe output like <c:out>
     ================================================================ -->
<table>
    <tr>
        <th>No (번호)</th>
        <td th:text="${board.boardSn}">-</td>
    </tr>
    <tr>
        <th>Title (제목)</th>
        <td th:text="${board.boardTitle}">-</td>
    </tr>
    <tr>
        <th>Content (내용)</th>
        <td th:text="${board.boardCn}">-</td>
    </tr>
    <tr>
        <th>Status (상태)</th>
        <td>
            <span th:if="${board.useYn == 'Y'}" style="color:green">Active (활성)</span>
            <span th:unless="${board.useYn == 'Y'}" style="color:red">Inactive (비활성)</span>
        </td>
    </tr>
    <tr>
        <th>Date (등록일시)</th>
        <!-- #temporals.format() replaces JSP's fn:substring() for LocalDateTime -->
        <td th:text="${#temporals.format(board.dataRegDt, 'yyyy-MM-dd HH:mm:ss')}">-</td>
    </tr>
</table>

<!-- ================================================================
     Edit Form (수정 폼)
     JSP: value="<c:out value='${board.boardTitle}'/>"
     Thymeleaf: th:value="${board.boardTitle}"

     JSP: <textarea><c:out value="${board.boardCn}"/></textarea>
     Thymeleaf: <textarea th:text="${board.boardCn}"></textarea>
     ================================================================ -->
<h3>Edit (수정)</h3>

<form id="updateForm" method="post" th:action="@{/board/update.do}">
    <!-- Hidden field: boardSn을 반드시 전송해야 어느 레코드를 수정할지 알 수 있음 -->
    <input type="hidden" name="boardSn" th:value="${board.boardSn}" />

    <table>
        <tr>
            <th>Title (제목) *</th>
            <td>
                <!-- th:value pre-fills input with existing data -->
                <input type="text"
                       id="boardTitle"
                       name="boardTitle"
                       th:value="${board.boardTitle}"
                       style="width:100%" />
                <span id="titleError" class="error-msg">
                    Title is required (제목을 입력하세요)
                </span>
            </td>
        </tr>
        <tr>
            <th>Content (내용)</th>
            <td>
                <!-- For textarea: th:text sets the content between the tags -->
                <textarea id="boardCn"
                          name="boardCn"
                          rows="5"
                          style="width:100%"
                          th:text="${board.boardCn}"></textarea>
            </td>
        </tr>
    </table>

    <div style="margin-top:10px;">
        <button type="button" class="btn btn-success" onclick="submitUpdate()">
            Save (저장)
        </button>
        <button type="button" class="btn btn-danger"
                th:onclick="'deleteBoard(' + ${board.boardSn} + ')'">
            Delete (삭제)
        </button>
        <button type="button" class="btn"
                th:onclick="|location.href='@{/board/list.do}'|">
            Back (목록)
        </button>
    </div>
</form>

<!-- Hidden delete form -->
<form id="deleteForm" method="post" th:action="@{/board/delete.do}">
    <input type="hidden" id="deleteBoardSn" name="boardSn" value="" />
</form>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    function submitUpdate() {
        const title = $('#boardTitle').val().trim();
        if (title === '') {
            $('#titleError').show();
            $('#boardTitle').focus();
            return;
        }
        $('#titleError').hide();
        $('#updateForm').submit();
    }

    function deleteBoard(boardSn) {
        if (!confirm('Delete this board? (삭제하시겠습니까?)')) return;
        $('#deleteBoardSn').val(boardSn);
        $('#deleteForm').submit();
    }

    $('#boardTitle').on('input', function() {
        if ($(this).val().trim() !== '') $('#titleError').hide();
    });
</script>

</body>
</html>
