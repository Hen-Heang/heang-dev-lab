<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Board Detail - Store Admin</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body class="sidebar-layout">

<!-- ── Sidebar ── -->
<aside th:replace="~{fragments/sidebar :: sidebar('board')}"></aside>

<!-- ── Main Content ── -->
<div class="main-content">
    <header class="topbar">
        <div class="topbar-left">
            <div class="topbar-breadcrumb">
                Home <span>›</span>
                <a th:href="@{/board/list.do}" style="color:var(--muted);text-decoration:none;">게시판 (Board)</a>
                <span>›</span> <strong>상세 (Detail)</strong>
            </div>
        </div>
        <div class="topbar-right">
            <a th:href="@{/swagger-ui.html}" class="topbar-btn" title="API Docs">🔌</a>
            <div class="avatar">A</div>
        </div>
    </header>

    <div class="page-content">

        <div class="page-header">
            <div class="page-title">
                <h1>Board Detail <span style="font-size:14px;color:var(--muted);font-weight:400;">(게시글 상세)</span></h1>
            </div>
            <a th:href="@{/board/list.do}" class="btn btn-secondary">← Back to List</a>
        </div>

        <!-- Detail View -->
        <div class="card" style="margin-bottom:20px;">
            <div style="padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;">
                <h2 style="font-size:15px;font-weight:700;">Post Info</h2>
                <span th:if="${board.useYn == 'Y'}" class="badge badge-active">활성 (Active)</span>
                <span th:unless="${board.useYn == 'Y'}" class="badge badge-inactive">비활성 (Inactive)</span>
            </div>
            <div style="padding:22px;">
                <table style="width:100%;border-collapse:collapse;">
                    <tr style="border-bottom:1px solid var(--line);">
                        <th style="padding:12px 0;font-size:12px;color:var(--muted);font-weight:600;width:120px;text-align:left;">No (번호)</th>
                        <td style="padding:12px 0;" th:text="${board.boardSn}">-</td>
                    </tr>
                    <tr style="border-bottom:1px solid var(--line);">
                        <th style="padding:12px 0;font-size:12px;color:var(--muted);font-weight:600;text-align:left;">Title (제목)</th>
                        <td style="padding:12px 0;font-weight:600;" th:text="${board.boardTitle}">-</td>
                    </tr>
                    <tr style="border-bottom:1px solid var(--line);">
                        <th style="padding:12px 0;font-size:12px;color:var(--muted);font-weight:600;text-align:left;">Content (내용)</th>
                        <td style="padding:12px 0;white-space:pre-wrap;" th:text="${board.boardCn}">-</td>
                    </tr>
                    <tr>
                        <th style="padding:12px 0;font-size:12px;color:var(--muted);font-weight:600;text-align:left;">Date (등록일시)</th>
                        <td style="padding:12px 0;color:var(--muted);font-size:13px;"
                            th:text="${#temporals.format(board.dataRegDt, 'yyyy-MM-dd HH:mm:ss')}">-</td>
                    </tr>
                </table>
            </div>
        </div>

        <!-- Attachments -->
        <div th:if="${not #lists.isEmpty(files)}" class="card" style="margin-bottom:20px;">
            <div style="padding:16px 22px;border-bottom:1px solid var(--line);">
                <h2 style="font-size:15px;font-weight:700;">Attachments (첨부파일)</h2>
            </div>
            <div style="padding:22px;">
                <div class="table-container">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>File Name (파일명)</th>
                            <th>Size (크기)</th>
                            <th>Download</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="file : ${files}">
                            <td th:text="${file.origName}">report.pdf</td>
                            <td th:text="${#numbers.formatDecimal(file.fileSize / 1024.0, 1, 1)} + ' KB'">0 KB</td>
                            <td>
                                <a th:href="@{/board/download.do(fileSn=${file.fileSn})}"
                                   class="btn btn-sm btn-primary">⬇ Download</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Edit Form -->
        <div class="card">
            <div style="padding:16px 22px;border-bottom:1px solid var(--line);">
                <h2 style="font-size:15px;font-weight:700;">Edit (수정)</h2>
            </div>
            <div style="padding:22px;">
                <form id="updateForm" method="post" th:action="@{/board/update.do}">
                    <input type="hidden" name="boardSn" th:value="${board.boardSn}"/>
                    <div class="form-group">
                        <label for="boardTitle">Title (제목) *</label>
                        <input type="text" id="boardTitle" name="boardTitle" class="form-control"
                               th:value="${board.boardTitle}"/>
                        <span id="titleError" style="color:var(--danger);font-size:12px;display:none;">
                            Title is required (제목을 입력하세요)
                        </span>
                    </div>
                    <div class="form-group">
                        <label for="boardCn">Content (내용)</label>
                        <textarea id="boardCn" name="boardCn" rows="5" class="form-control"
                                  th:text="${board.boardCn}"></textarea>
                    </div>
                    <div style="display:flex;gap:10px;">
                        <button type="button" class="btn btn-success" onclick="submitUpdate()">Save (저장)</button>
                        <button type="button" class="btn btn-danger"
                                th:onclick="'deleteBoard(' + ${board.boardSn} + ')'">Delete (삭제)</button>
                        <button type="button" class="btn btn-secondary"
                                th:onclick="|location.href='@{/board/list.do}'|">Back (목록)</button>
                    </div>
                </form>
            </div>
        </div>

    </div><!-- /page-content -->
</div><!-- /main-content -->

<!-- Hidden delete form -->
<form id="deleteForm" method="post" th:action="@{/board/delete.do}">
    <input type="hidden" id="deleteBoardSn" name="boardSn" value=""/>
</form>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    function submitUpdate() {
        const title = $('#boardTitle').val().trim();
        if (title === '') {
            $('#titleError').show();
            $('#boardTitle').focus();
            return;
        }
        $('#titleError').hide();
        $('#updateForm').submit();
    }

    function deleteBoard(boardSn) {
        if (!confirm('Delete this board? (삭제하시겠습니까?)')) return;
        $('#deleteBoardSn').val(boardSn);
        $('#deleteForm').submit();
    }

    $('#boardTitle').on('input', function () {
        if ($(this).val().trim() !== '') $('#titleError').hide();
    });
</script>
</body>
</html>
