<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Users - Store Admin</title>
    <link rel="stylesheet" th:href="@{/css/base.css}"/>
    <link rel="stylesheet" th:href="@{/css/layout.css}"/>
    <link rel="stylesheet" th:href="@{/css/components.css}"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="sidebar-layout">

<!-- ── Sidebar ── -->
<aside th:replace="~{fragments/sidebar :: sidebar('users')}"></aside>

<!-- ── Main Content ── -->
<div class="main-content">
    <header class="topbar">
        <div class="topbar-left">
            <div class="topbar-breadcrumb">Home <span>›</span> Users <span>›</span> <strong>All Users</strong></div>
        </div>
        <div class="topbar-right">
            <a th:href="@{/swagger-ui.html}" class="topbar-btn" title="API Docs">🔌</a>
            <div class="avatar">A</div>
        </div>
    </header>

    <div class="page-content">

        <div class="page-header">
            <div class="page-title">
                <h1>All Users <span style="font-size:14px;color:var(--muted);font-weight:400;">(사용자 목록)</span></h1>
                <p>Search, view, edit and delete user accounts.</p>
            </div>
            <a th:href="@{/}" class="btn btn-primary">+ Create New User</a>
        </div>

        <!-- Stat cards -->
        <div class="stat-grid" style="margin-bottom:20px;">
            <div class="stat-card">
                <div class="stat-icon blue">👥</div>
                <div class="stat-body">
                    <div class="stat-label">Total Users</div>
                    <div class="stat-value" id="totalUsers">-</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">✅</div>
                <div class="stat-body">
                    <div class="stat-label">Active</div>
                    <div class="stat-value" id="activeUsers">-</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">⏸️</div>
                <div class="stat-body">
                    <div class="stat-label">Inactive</div>
                    <div class="stat-value" id="inactiveUsers">-</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">⏳</div>
                <div class="stat-body">
                    <div class="stat-label">Pending</div>
                    <div class="stat-value" id="pendingUsers">-</div>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-box" style="margin-bottom:20px;">
            <div class="search-row">
                <div class="search-item">
                    <label for="searchType">Search By</label>
                    <select id="searchType" class="form-control">
                        <option value="all">All Fields (전체)</option>
                        <option value="username">Username</option>
                        <option value="email">Email</option>
                    </select>
                </div>
                <div class="search-item" style="flex:1;">
                    <label for="searchKeyword">Keyword</label>
                    <input type="text" id="searchKeyword" class="form-control"
                           placeholder="Enter search keyword..."/>
                </div>
                <div class="search-item search-actions">
                    <button type="button" class="btn btn-primary" onclick="searchUsers()">Search</button>
                    <button type="button" class="btn btn-secondary" onclick="resetSearch()">Reset</button>
                </div>
            </div>
        </div>

        <div class="table-container" id="usersTableContainer">
            <div class="text-center" style="padding:24px;color:var(--muted);">Loading users...</div>
        </div>
        <div id="pagination" class="pagination" style="margin-top:16px;"></div>

    </div><!-- /page-content -->
</div><!-- /main-content -->

<!-- View User Modal -->
<div id="viewModal" class="modal" onclick="if(event.target===this)closeViewModal()">
    <div class="modal-content">
        <div class="modal-header">
            <h2>User Details (사용자 정보)</h2>
            <button type="button" class="close-btn" onclick="closeViewModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="user-detail">
                <div class="user-detail-row">
                    <span class="user-detail-label">ID:</span>
                    <span class="user-detail-value" id="viewId"></span>
                </div>
                <div class="user-detail-row">
                    <span class="user-detail-label">Username:</span>
                    <span class="user-detail-value" id="viewUsername"></span>
                </div>
                <div class="user-detail-row">
                    <span class="user-detail-label">Email:</span>
                    <span class="user-detail-value" id="viewEmail"></span>
                </div>
                <div class="user-detail-row">
                    <span class="user-detail-label">Status:</span>
                    <span class="user-detail-value" id="viewStatus"></span>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeViewModal()">Close</button>
        </div>
    </div>
</div>

<!-- Edit User Modal -->
<div id="editModal" class="modal" onclick="if(event.target===this)closeEditModal()">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Edit User (사용자 수정)</h2>
            <button type="button" class="close-btn" onclick="closeEditModal()">&times;</button>
        </div>
        <form style="padding:20px 22px;">
            <input type="hidden" id="editId"/>
            <div class="form-group">
                <label for="editUsername">Username *</label>
                <input type="text" id="editUsername" class="form-control" required maxlength="100"/>
            </div>
            <div class="form-group">
                <label for="editEmail">Email *</label>
                <input type="email" id="editEmail" class="form-control" required maxlength="150"/>
            </div>
            <div class="form-group">
                <label for="editStatus">Status</label>
                <select id="editStatus" class="form-control">
                    <option value="">-- Select Status --</option>
                    <option value="ACTIVE">Active</option>
                    <option value="INACTIVE">Inactive</option>
                    <option value="PENDING">Pending</option>
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button type="button" class="btn btn-success" onclick="saveUser()">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    window.APP_CONTEXT = /*[[@{/}]]*/ '/';
    if (window.APP_CONTEXT.endsWith('/')) {
        window.APP_CONTEXT = window.APP_CONTEXT.slice(0, -1);
    }
</script>
<script th:src="@{/js/user-api.js}"></script>
<script>
    let allUsers = [];
    let currentPage = 1;
    let pageSize = 10;
    let totalCount = 0;
    let currentQuery = {};

    $(document).ready(function () {
        loadUsers();
        $('#searchKeyword').on('keypress', function (e) {
            if (e.which === 13) searchUsers();
        });
    });

    function loadUsers(page) {
        currentPage = page || 1;
        const params = Object.assign({}, currentQuery, {page: currentPage, size: pageSize});
        UserAPI.getAll(params,
            function (result) {
                const data = result.data;
                const users = Array.isArray(data) ? data : (data && data.users) ? data.users : [];
                allUsers = users;
                totalCount = (data && data.total != null) ? data.total : users.length;
                renderUsersTable(users);
                updateStats(users, totalCount);
                renderPagination(totalCount, (data && data.page) || currentPage, (data && data.size) || pageSize);
            },
            function () {
                $('#usersTableContainer').html('<p style="padding:24px;color:var(--muted);">Error loading users. Please try again.</p>');
            }
        );
    }

    function updateStats(users, total) {
        $('#totalUsers').text(total);
        $('#activeUsers').text(users.filter(function (u) { return u.status === 'ACTIVE'; }).length);
        $('#inactiveUsers').text(users.filter(function (u) { return u.status === 'INACTIVE'; }).length);
        $('#pendingUsers').text(users.filter(function (u) { return u.status === 'PENDING'; }).length);
    }

    function renderUsersTable(users) {
        const $container = $('#usersTableContainer');
        let html = '<table class="table"><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        if (!users || users.length === 0) {
            html += '<tr><td colspan="5" class="text-center">No Data (데이터가 없습니다)</td></tr>';
        } else {
            $.each(users, function (index, user) {
                html += '<tr>';
                html += '<td style="color:var(--muted);font-size:12px;">#' + user.id + '</td>';
                html += '<td style="font-weight:500;">' + UIHelper.escapeHtml(user.username) + '</td>';
                html += '<td>' + UIHelper.escapeHtml(user.email) + '</td>';
                html += '<td>' + UIHelper.getStatusBadge(user.status) + '</td>';
                html += '<td style="white-space:nowrap;">';
                html += '<button class="btn btn-sm btn-secondary" onclick="viewUser(' + user.id + ')">View</button> ';
                html += '<button class="btn btn-sm btn-secondary" onclick="editUser(' + user.id + ')">Edit</button> ';
                html += '<button class="btn btn-sm btn-danger" onclick="deleteUser(' + user.id + ')">Delete</button>';
                html += '</td></tr>';
            });
        }
        html += '</tbody></table>';
        $container.html(html);
    }

    function viewUser(id) {
        const user = allUsers.find(function (u) { return u.id === id; });
        if (user) {
            $('#viewId').text(user.id);
            $('#viewUsername').text(user.username || '');
            $('#viewEmail').text(user.email || '');
            $('#viewStatus').html(UIHelper.getStatusBadge(user.status));
            $('#viewModal').addClass('show');
        }
    }

    function closeViewModal() { $('#viewModal').removeClass('show'); }

    function editUser(id) {
        const user = allUsers.find(function (u) { return u.id === id; });
        if (user) {
            $('#editId').val(user.id);
            $('#editUsername').val(user.username || '');
            $('#editEmail').val(user.email || '');
            $('#editStatus').val(user.status || '');
            $('#editModal').addClass('show');
        }
    }

    function closeEditModal() { $('#editModal').removeClass('show'); }

    function saveUser() {
        const id = $('#editId').val();
        const userData = {
            username: $('#editUsername').val(),
            email: $('#editEmail').val(),
            status: $('#editStatus').val() || null
        };
        UserAPI.update(id, userData,
            function () {
                alert('User updated successfully!');
                closeEditModal();
                loadUsers(currentPage);
            },
            function (xhr, status, error) {
                alert('Failed to update user: ' + error);
            }
        );
    }

    function deleteUser(id) {
        if (!confirm('Are you sure you want to delete this user?')) return;
        UserAPI.delete(id,
            function () {
                alert('User deleted successfully!');
                loadUsers(currentPage);
            },
            function (xhr, status, error) {
                alert('Failed to delete user: ' + error);
            }
        );
    }

    function searchUsers() {
        const searchType = $('#searchType').val();
        const keyword = $('#searchKeyword').val().trim();
        currentQuery = {};
        if (keyword) {
            if (searchType === 'username') currentQuery.username = keyword;
            else if (searchType === 'email') currentQuery.email = keyword;
            else currentQuery.keyword = keyword;
        }
        loadUsers(1);
    }

    function resetSearch() {
        $('#searchKeyword').val('');
        $('#searchType').val('all');
        currentQuery = {};
        loadUsers(1);
    }

    function renderPagination(total, page, size) {
        const $pagination = $('#pagination');
        const totalPages = Math.ceil(total / size);
        if (!totalPages || totalPages <= 1) { $pagination.html(''); return; }
        const prevDisabled = page <= 1 ? 'disabled' : '';
        const nextDisabled = page >= totalPages ? 'disabled' : '';
        let html = '';
        html += '<button class="btn btn-sm btn-secondary" ' + prevDisabled + ' onclick="goToPage(' + (page - 1) + ')">Prev</button>';
        html += '<span style="padding:0 12px;font-size:13px;color:var(--muted);">Page ' + page + ' / ' + totalPages + '</span>';
        html += '<button class="btn btn-sm btn-secondary" ' + nextDisabled + ' onclick="goToPage(' + (page + 1) + ')">Next</button>';
        $pagination.html(html);
    }

    function goToPage(page) {
        if (page < 1) return;
        loadUsers(page);
    }
</script>
</body>
</html>
