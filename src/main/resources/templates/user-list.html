<!DOCTYPE html>
<!--
  user-list.html — Thymeleaf version (converted from user-list.jsp)

  Key changes:
  - pageContext.request.contextPath → th:href="@{/css/...}"
  - window.APP_CONTEXT → th:inline="javascript" with @{/} link expression
  - All jQuery/AJAX code stays exactly the same
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Users - Store Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>🏪 Store Admin</h1>
        <nav class="nav">
            <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
            <a th:href="@{/store/category}" class="nav-link">Category</a>
            <a th:href="@{/store/product}" class="nav-link">Product</a>
            <a th:href="@{/}" class="nav-link active">Users</a>
        </nav>
    </header>

    <main class="main">
        <div class="page-header">
            <h2>All Users (사용자 목록)</h2>
            <a th:href="@{/}" class="btn btn-primary">+ Create New User</a>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">-</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeUsers">-</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="inactiveUsers">-</div>
                <div class="stat-label">Inactive</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingUsers">-</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <div class="search-box">
            <div class="search-box-title">🔍 Search Users (사용자 검색)</div>
            <div class="search-row">
                <label for="searchType"></label>
                <select id="searchType" class="search-select">
                    <option value="all">All Fields (전체)</option>
                    <option value="username">Username (이름)</option>
                    <option value="email">Email (이메일)</option>
                </select>
                <label for="searchKeyword"></label>
                <input type="text" id="searchKeyword" class="search-input"
                       placeholder="Enter search keyword... (검색어를 입력하세요)"/>
                <button type="button" class="btn-search" onclick="searchUsers()">Search (검색)</button>
                <button type="button" class="btn-reset" onclick="resetSearch()">Reset (초기화)</button>
            </div>
        </div>

        <div id="usersTableContainer">
            <div class="loading">Loading users...</div>
        </div>
        <div id="pagination" class="pagination"></div>

        <!-- View User Modal -->
        <div id="viewModal" class="modal-overlay">
            <div class="modal">
                <h2>User Details (사용자 정보)</h2>
                <div class="modal-body">
                    <div class="user-detail">
                        <div class="user-detail-row">
                            <span class="user-detail-label">ID:</span>
                            <span class="user-detail-value" id="viewId"></span>
                        </div>
                        <div class="user-detail-row">
                            <span class="user-detail-label">Username:</span>
                            <span class="user-detail-value" id="viewUsername"></span>
                        </div>
                        <div class="user-detail-row">
                            <span class="user-detail-label">Email:</span>
                            <span class="user-detail-value" id="viewEmail"></span>
                        </div>
                        <div class="user-detail-row">
                            <span class="user-detail-label">Status:</span>
                            <span class="user-detail-value" id="viewStatus"></span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn" onclick="closeViewModal()">Close</button>
                </div>
            </div>
        </div>

        <!-- Edit User Modal -->
        <div id="editModal" class="modal-overlay">
            <div class="modal">
                <h2>Edit User (사용자 수정)</h2>
                <div class="modal-body">
                    <input type="hidden" id="editId"/>
                    <div class="form-group">
                        <label for="editUsername">Username *</label>
                        <input type="text" id="editUsername" required maxlength="100"/>
                    </div>
                    <div class="form-group">
                        <label for="editEmail">Email *</label>
                        <input type="email" id="editEmail" required maxlength="150"/>
                    </div>
                    <div class="form-group">
                        <label for="editStatus">Status</label>
                        <select id="editStatus">
                            <option value="">-- Select Status --</option>
                            <option value="ACTIVE">Active</option>
                            <option value="INACTIVE">Inactive</option>
                            <option value="PENDING">Pending</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button class="btn btn-success" onclick="saveUser()">Save Changes</button>
                </div>
            </div>
        </div>

        <!--
          JSP: window.APP_CONTEXT = pageContext.request.contextPath
          Thymeleaf: th:inline="javascript" lets us use inline expressions inside script
          The natural template form shows a default in static preview, runtime replaces it
        -->
        <script th:inline="javascript">
            // @{/} resolves to the app context path (e.g. "" or "/myapp")
            // Thymeleaf 3.1+ blocked #request — use @{} link expressions instead
            window.APP_CONTEXT = /*[[@{/}]]*/ '/';
            // strip trailing slash so user-api.js can do APP_CONTEXT + '/users'
            if (window.APP_CONTEXT.endsWith('/')) {
                window.APP_CONTEXT = window.APP_CONTEXT.slice(0, -1);
            }
        </script>

        <script th:src="@{/js/user-api.js}"></script>

        <!-- jQuery code stays exactly the same as the JSP version -->
        <script>
            let allUsers = [];
            let currentPage = 1;
            let pageSize = 10;
            let totalCount = 0;
            let currentQuery = {};

            $(document).ready(function () {
                loadUsers();
                setupModalCloseOnOutsideClick('viewModal');
                setupModalCloseOnOutsideClick('editModal');
                $('#searchKeyword').on('keypress', function (e) {
                    if (e.which === 13) searchUsers();
                });
            });

            function loadUsers(page) {
                currentPage = page || 1;
                const params = Object.assign({}, currentQuery, {page: currentPage, size: pageSize});
                UserAPI.getAll(
                    params,
                    function (result) {
                        const data = result.data;
                        const users = Array.isArray(data) ? data : (data && data.users) ? data.users : [];
                        allUsers = users;
                        totalCount = (data && data.total != null) ? data.total : users.length;
                        renderUsersTable(users);
                        updateStats(users, totalCount);
                        renderPagination(totalCount, (data && data.page) || currentPage, (data && data.size) || pageSize);
                    },
                    function (xhr, status, error) {
                        $('#usersTableContainer').html('<p class="muted">Error loading users. Please try again.</p>');
                    }
                );
            }

            function updateStats(users, total) {
                $('#totalUsers').text(total);
                $('#activeUsers').text(users.filter(function (u) {
                    return u.status === 'ACTIVE';
                }).length);
                $('#inactiveUsers').text(users.filter(function (u) {
                    return u.status === 'INACTIVE';
                }).length);
                $('#pendingUsers').text(users.filter(function (u) {
                    return u.status === 'PENDING';
                }).length);
            }

            function renderUsersTable(users) {
                const $container = $('#usersTableContainer');
                let html = '<table>';
                html += '<thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
                if (!users || users.length === 0) {
                    html += '<tr><td colspan="5" class="no-data">No Data (데이터가 없습니다)</td></tr>';
                } else {
                    $.each(users, function (index, user) {
                        html += '<tr>';
                        html += '<td>' + user.id + '</td>';
                        html += '<td>' + UIHelper.escapeHtml(user.username) + '</td>';
                        html += '<td>' + UIHelper.escapeHtml(user.email) + '</td>';
                        html += '<td>' + UIHelper.getStatusBadge(user.status) + '</td>';
                        html += '<td class="actions">';
                        html += '<button class="btn btn-sm" onclick="viewUser(' + user.id + ')">View</button>';
                        html += '<button class="btn btn-sm btn-warning" onclick="editUser(' + user.id + ')">Edit</button>';
                        html += '<button class="btn btn-sm btn-danger" onclick="deleteUser(' + user.id + ')">Delete</button>';
                        html += '</td></tr>';
                    });
                }
                html += '</tbody></table>';
                $container.html(html);
            }

            function viewUser(id) {
                let user = null;
                $.each(allUsers, function (index, u) {
                    if (u.id === id) {
                        user = u;
                        return false;
                    }
                });
                if (user) {
                    $('#viewId').text(user.id);
                    $('#viewUsername').text(user.username || '');
                    $('#viewEmail').text(user.email || '');
                    $('#viewStatus').html(UIHelper.getStatusBadge(user.status));
                    UIHelper.showModal('viewModal');
                }
            }

            function closeViewModal() {
                UIHelper.closeModal('viewModal');
            }

            function editUser(id) {
                let user = null;
                $.each(allUsers, function (index, u) {
                    if (u.id === id) {
                        user = u;
                        return false;
                    }
                });
                if (user) {
                    $('#editId').val(user.id);
                    $('#editUsername').val(user.username || '');
                    $('#editEmail').val(user.email || '');
                    $('#editStatus').val(user.status || '');
                    UIHelper.showModal('editModal');
                }
            }

            function closeEditModal() {
                UIHelper.closeModal('editModal');
            }

            function saveUser() {
                const id = $('#editId').val();
                const userData = {
                    username: $('#editUsername').val(),
                    email: $('#editEmail').val(),
                    status: $('#editStatus').val() || null
                };
                UserAPI.update(id, userData,
                    function (result) {
                        alert('User updated successfully!');
                        closeEditModal();
                        loadUsers(currentPage);
                    },
                    function (xhr, status, error) {
                        alert('Failed to update user: ' + error);
                    }
                );
            }

            function deleteUser(id) {
                if (!confirm('Are you sure you want to delete this user?')) return;
                UserAPI.delete(id,
                    function (result) {
                        alert('User deleted successfully!');
                        loadUsers(currentPage);
                    },
                    function (xhr, status, error) {
                        alert('Failed to delete user: ' + error);
                    }
                );
            }

            function searchUsers() {
                const searchType = $('#searchType').val();
                const keyword = $('#searchKeyword').val().trim();
                currentQuery = {};
                if (keyword) {
                    if (searchType === 'username') currentQuery.username = keyword;
                    else if (searchType === 'email') currentQuery.email = keyword;
                    else currentQuery.keyword = keyword;
                }
                loadUsers(1);
            }

            function resetSearch() {
                $('#searchKeyword').val('');
                $('#searchType').val('all');
                currentQuery = {};
                loadUsers(1);
            }

            function renderPagination(total, page, size) {
                const $pagination = $('#pagination');
                const totalPages = Math.ceil(total / size);
                if (!totalPages || totalPages <= 1) {
                    $pagination.html('');
                    return;
                }
                const prevDisabled = page <= 1 ? 'disabled' : '';
                const nextDisabled = page >= totalPages ? 'disabled' : '';
                let html = '';
                html += '<button class="btn btn-sm btn-secondary" ' + prevDisabled + ' onclick="goToPage(' + (page - 1) + ')">Prev</button>';
                html += '<span class="page-info">Page ' + page + ' / ' + totalPages + '</span>';
                html += '<button class="btn btn-sm btn-secondary" ' + nextDisabled + ' onclick="goToPage(' + (page + 1) + ')">Next</button>';
                $pagination.html(html);
            }

            function goToPage(page) {
                if (page < 1) return;
                loadUsers(page);
            }
        </script>
    </main>
</div>
</body>
</html>
