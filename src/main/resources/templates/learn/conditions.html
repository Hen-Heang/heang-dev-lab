<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Step 3 - 조건문</title>
</head>
<body>

<h1>Step 3: 조건문 (th:if / th:switch)</h1>

<h3>[ th:if / th:unless ]</h3>

<!-- th:if → 조건이 true일 때만 보임 -->
<p th:if="${userRole == 'ADMIN'}">✅ 관리자 메뉴가 보입니다</p>

<!-- th:unless → 조건이 false일 때 보임 (if 반대) -->
<p th:unless="${userRole == 'ADMIN'}">👤 일반 사용자입니다</p>

<hr>

<h3>[ th:switch / th:case ]</h3>

<div th:switch="${loginStatus}">
    <p th:case="'ACTIVE'">🟢 활성 계정</p>
    <p th:case="'INACTIVE'">🔴 비활성 계정</p>
    <p th:case="'SUSPENDED'">🚫 정지된 계정</p>
    <p th:case="*">❓ 알 수 없는 상태</p>  <!-- default -->
</div>

<hr>

<h3>[ 숫자 비교 ]</h3>

<p th:if="${point >= 1000}">
    ⭐ VIP 회원입니다 (포인트: <span th:text="${point}">0</span>)
</p>
<p th:if="${point < 1000}">일반 회원입니다</p>

<hr>

<p><strong>현재 값 확인:</strong>
    userRole = <span th:text="${userRole}">-</span> /
    loginStatus = <span th:text="${loginStatus}">-</span> /
    point = <span th:text="${point}">0</span>
</p>

<a th:href="@{/learn/users}">← Step 2</a>
&nbsp;&nbsp;
<a th:href="@{/learn/urls}">Step 4 - URL →</a>

</body>
</html>
